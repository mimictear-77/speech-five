<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>路演工坊</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: '#0A0A0A',
          accent: { DEFAULT: '#7A5500', soft: '#FFFAEC' }
        },
        fontFamily: {
          sans: ['"Noto Sans SC"','PingFang SC','Hiragino Sans GB','Microsoft YaHei','sans-serif']
        }
      }
    }
  };
</script>

<style>
/* ─────────────────────────────────────────
   V6 — Corporate Minimalism
   思源黑体 / 近黑+留白 / 单一深棕黄强调色 /
   线性 Material Icons / 仅淡入动画
   ───────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0A0A0A;
  --t2:#404040;--t3:#737373;--t4:#A3A3A3;--t5:#D4D4D4;
  --bg:#FFFFFF;--bg2:#FAFAFA;--bg3:#F4F4F4;
  --bd:#E5E5E5;--bd2:#D4D4D4;
  --accent:#7A5500;--accent-soft:#FFFAEC;
  --r:6px;--rs:4px;
  --ease:cubic-bezier(.4,0,.2,1);
}
html,body{min-height:100vh}
body{
  font-family:'Noto Sans SC','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-weight:400;
  background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  font-feature-settings:"tnum","cv11";
}
/* Material Icons */
.mi{font-family:'Material Icons Outlined';font-weight:normal;font-style:normal;display:inline-block;line-height:1;text-transform:none;letter-spacing:normal;word-wrap:normal;white-space:nowrap;direction:ltr;font-feature-settings:'liga';-webkit-font-smoothing:antialiased;vertical-align:middle;font-size:inherit}

/* Header */
.hd{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(255,255,255,.96);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 40px;z-index:100}
.logo{font-size:13px;font-weight:700;letter-spacing:.4px;color:var(--ink)}
.logo em{color:var(--accent);font-style:normal;font-weight:700}
.pb{display:none}
.steps{display:flex;gap:8px;align-items:center}
.step-text{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:1.5px;font-feature-settings:'tnum';margin-right:6px}
.sd{width:22px;height:2px;background:var(--bd);transition:background .25s var(--ease),height .25s var(--ease)}
.sd.on{background:var(--ink);height:3px}
.sd.ok{background:var(--ink);opacity:.35}

/* Main */
.main{padding-top:60px;min-height:100vh}

/* Toast */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:12px 22px;border-radius:var(--r);font-size:13px;font-weight:500;opacity:0;transition:opacity .2s var(--ease),transform .2s var(--ease);z-index:200;white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Fade in (only opacity, no transform — Corporate Minimalism 克制动画) */
@keyframes fi{from{opacity:0}to{opacity:1}}
.fi{animation:fi .4s var(--ease)}

/* Setup */
.setup{max-width:560px;margin:0 auto;padding:120px 32px 64px}
.eyebrow{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:24px;display:inline-flex;align-items:center;gap:10px}
.eyebrow::before{content:'';width:24px;height:2px;background:var(--accent);display:inline-block}
.setup h1{font-size:64px;font-weight:900;letter-spacing:-3px;line-height:1.02;margin-bottom:24px;color:var(--ink)}
.setup h1 .grey{color:var(--t3);font-weight:700}
.setup>p{font-size:16px;color:var(--t2);line-height:1.7;margin-bottom:48px;max-width:440px}

.fg{margin-bottom:24px}
.fl{display:block;font-size:12px;font-weight:600;margin-bottom:8px;color:var(--t2);letter-spacing:.6px;text-transform:uppercase}
.fi-input{width:100%;padding:14px 0;border:none;border-bottom:1.5px solid var(--bd);border-radius:0;font-size:16px;font-family:inherit;color:var(--ink);background:transparent;transition:border-color .2s var(--ease);outline:none;font-weight:500}
.fi-input:hover{border-color:var(--t3)}
.fi-input:focus{border-color:var(--ink)}
.fi-input::placeholder{color:var(--t4);font-weight:400}
textarea.fi-input{resize:none;height:80px;line-height:1.55;padding:14px 0}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px 20px;background:var(--ink);color:var(--bg);border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;transition:background .2s var(--ease),opacity .2s;font-family:inherit;margin-top:12px;letter-spacing:.5px}
.btn:hover{background:var(--accent)}
.btn:disabled{opacity:.3;cursor:not-allowed;background:var(--ink)}
.btn .mi{font-size:18px}

.adv-t{font-size:13px;color:var(--t3);cursor:pointer;text-align:center;margin-top:24px;padding:8px;transition:color .15s;display:inline-flex;align-items:center;gap:6px;justify-content:center;width:100%}
.adv-t:hover{color:var(--ink)}
.adv-p{display:none;margin-top:18px;padding:24px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--bd)}
.adv-p.open{display:block;animation:fi .25s var(--ease)}
.adv-p .fg{margin-bottom:18px}
.adv-p .fl{font-size:11px}
.adv-p .fi-input{font-size:14px;padding:11px 0}

/* 模型预设按钮组 */
.preset-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.preset-btn{padding:8px 14px;background:transparent;color:var(--ink);border:1.5px solid var(--bd);border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:border-color .15s var(--ease),background .15s var(--ease)}
.preset-btn:hover{border-color:var(--ink);background:var(--bg2)}

/* Chat */
.chat{max-width:680px;margin:0 auto;padding:64px 32px 160px}
.sh{margin-bottom:56px}
.sn{display:flex;align-items:baseline;gap:14px;margin-bottom:18px;font-feature-settings:'tnum'}
.sn-num{font-size:72px;font-weight:900;line-height:.9;color:var(--ink);letter-spacing:-3px}
.sn-total{font-size:15px;font-weight:600;color:var(--t4);letter-spacing:1px}
.st{font-size:32px;font-weight:700;letter-spacing:-1px;line-height:1.2;color:var(--ink)}
.sd2{font-size:15px;color:var(--t2);margin-top:14px;line-height:1.65;max-width:560px}

/* Context card */
.ctx{background:var(--bg2);border:none;border-left:3px solid var(--accent);border-radius:0;padding:14px 18px;margin-bottom:32px;font-size:14px;line-height:1.6;color:var(--t2)}
.ctx strong{color:var(--ink);font-size:11px;display:block;margin-bottom:6px;letter-spacing:.8px;text-transform:uppercase;font-weight:700}

/* Messages */
.msgs{display:flex;flex-direction:column;gap:24px}
.msg{display:flex;gap:14px;animation:fi .35s var(--ease)}
.msg.u{flex-direction:row-reverse}
.av{width:32px;height:32px;border-radius:50%;background:var(--bg2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;font-weight:600;color:var(--t2)}
.msg.u .av{background:var(--ink);color:var(--bg);border-color:var(--ink);font-size:13px}
.av .mi{font-size:18px;color:var(--ink)}
.msg.u .av .mi{color:var(--bg)}

.bub{max-width:80%;padding:14px 18px;border-radius:6px;font-size:15px;line-height:1.7}
.msg.ai .bub{background:var(--bg2);color:var(--ink)}
.msg.u .bub{background:var(--ink);color:var(--bg)}
.msg.out .bub{background:var(--bg);border:1px solid var(--bd2);border-radius:var(--r);max-width:100%;padding:28px 32px;color:var(--ink);box-shadow:none}

/* Loading */
.ld{display:flex;gap:5px;padding:14px 18px;background:var(--bg2);border-radius:6px;width:fit-content}
.ld-d{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:bounce 1.4s infinite}
.ld-d:nth-child(2){animation-delay:.18s}.ld-d:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* Input area */
.ia{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);border-top:1px solid var(--bd);padding:18px 32px}
.ic{max-width:680px;margin:0 auto;display:flex;gap:12px;align-items:flex-end}
.ci{flex:1;padding:13px 16px;border:1.5px solid var(--bd);border-radius:var(--r);font-size:15px;font-family:inherit;color:var(--ink);background:var(--bg);resize:none;outline:none;min-height:46px;max-height:140px;line-height:1.55;transition:border-color .15s var(--ease)}
.ci:hover{border-color:var(--t3)}
.ci:focus{border-color:var(--ink)}
.sb{width:46px;height:46px;background:var(--ink);color:var(--bg);border:none;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s var(--ease)}
.sb:hover{background:var(--accent)}
.sb:disabled{opacity:.3;cursor:not-allowed;background:var(--t4)}
.sb .mi{font-size:20px;color:var(--bg)}

/* Next button */
.nb{display:inline-flex;align-items:center;gap:10px;padding:14px 24px;background:var(--ink);color:var(--bg);border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s var(--ease);margin-top:36px;letter-spacing:.4px}
.nb:hover{background:var(--accent)}
.nb .mi{font-size:18px}

/* Gen loading */
.gl{padding:80px 0;text-align:center}
.gl .ld{margin:0 auto}
.gl p{margin-top:18px;color:var(--t3);font-size:13px;letter-spacing:.4px}

/* Complete */
.cpl{max-width:720px;margin:0 auto;padding:96px 32px 96px}
.cpl-hd{margin-bottom:64px;padding-bottom:40px;border-bottom:1px solid var(--bd)}
.cpl-eyebrow{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:18px;display:inline-flex;align-items:center;gap:10px}
.cpl-eyebrow::before{content:'';width:24px;height:2px;background:var(--accent);display:inline-block}
.cpl h1{font-size:48px;font-weight:900;letter-spacing:-2px;margin-bottom:14px;color:var(--ink);line-height:1.1}
.cpl .sub{font-size:15px;color:var(--t2);line-height:1.6;max-width:480px}
.act{display:flex;gap:12px;margin-top:32px;flex-wrap:wrap}
.btn2{display:inline-flex;align-items:center;gap:8px;padding:11px 20px;background:var(--bg);color:var(--ink);border:1.5px solid var(--bd);border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s var(--ease)}
.btn2:hover{border-color:var(--ink);background:var(--bg2)}
.btn2 .mi{font-size:16px;color:var(--ink)}
.btn3{display:inline-flex;align-items:center;gap:8px;padding:11px 20px;background:var(--ink);color:var(--bg);border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s var(--ease)}
.btn3:hover{background:var(--accent)}
.btn3 .mi{font-size:16px;color:var(--bg)}

.rs{background:var(--bg);border:none;border-top:1px solid var(--bd);border-radius:0;padding:36px 0;margin-bottom:0;box-shadow:none}
.rs:last-of-type{border-bottom:1px solid var(--bd)}
.rs-t{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1.5px;margin-bottom:18px;text-transform:uppercase;font-feature-settings:'tnum';display:flex;align-items:center;gap:10px}
.rs-t::before{content:'';width:18px;height:2px;background:var(--accent)}
.rs-c{font-size:15px;line-height:1.85;white-space:pre-wrap;color:var(--ink)}
.rs-loading{padding:14px 0;color:var(--t3);font-size:14px;display:flex;align-items:center;gap:14px}
.rs-loading .ld{padding:8px 14px;background:var(--bg2)}

/* hint */
.hint{font-size:12px;color:var(--t4);margin-top:8px;line-height:1.5}

/* Tip card */
.tip{font-size:13.5px;color:var(--t2);line-height:1.7;margin-bottom:32px;padding:14px 16px;background:var(--bg2);border:none;border-left:3px solid var(--ink);border-radius:0;display:flex;align-items:flex-start;gap:10px}
.tip .mi{color:var(--ink);font-size:18px;flex-shrink:0;margin-top:2px}

/* Warm-pause（模块 5 生成前的温度提示） */
.warm-pause{text-align:center;padding:64px 20px 40px;max-width:540px;margin:0 auto}
.warm-pause h2{font-size:36px;font-weight:900;letter-spacing:-1.2px;line-height:1.25;margin-bottom:28px;color:var(--ink)}
.warm-pause p{font-size:16px;color:var(--t2);line-height:1.85;margin-bottom:8px}
.warm-pause .warm-meta{font-size:13.5px;color:var(--t3);margin-top:28px;margin-bottom:44px;font-weight:500;line-height:1.7}
.warm-pause .btn{max-width:280px;margin:0 auto}
@media(max-width:600px){
  .warm-pause{padding:40px 16px 32px}
  .warm-pause h2{font-size:28px;letter-spacing:-1px}
  .warm-pause p{font-size:15px}
}

/* Paragraph rhythm */
.bub p,.rs-c p{margin:0 0 12px}
.bub p:last-child,.rs-c p:last-child{margin-bottom:0}
.msg.out .bub p{margin:0 0 16px}
.msg.out .bub p:last-child{margin-bottom:0}

/* Highlight markers */
.hl{color:var(--accent);font-weight:700}
.msg.u .bub .hl{color:var(--bg);text-decoration:underline;text-decoration-color:var(--accent);text-underline-offset:3px}

/* Back button */
.backBtn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--t3);font-size:13px;cursor:pointer;padding:6px 0;margin-bottom:32px;font-family:inherit;border-radius:0;transition:color .15s var(--ease);font-weight:500}
.backBtn:hover{color:var(--ink)}
.backBtn:disabled{opacity:.4;cursor:not-allowed}
.backBtn .mi{font-size:16px}

/* Mobile */
@media(max-width:600px){
  .hd{padding:0 20px}
  .setup{padding:80px 24px 56px}
  .eyebrow{margin-bottom:18px}
  .setup h1{font-size:42px;letter-spacing:-1.6px}
  .setup>p{font-size:15px;margin-bottom:38px}
  .chat{padding:48px 24px 130px}
  .sn-num{font-size:52px}
  .st{font-size:26px;letter-spacing:-.6px}
  .sd2{font-size:14.5px}
  .bub{max-width:88%;font-size:14.5px;padding:12px 15px}
  .msg.out .bub{padding:22px 24px}
  .ia{padding:14px 18px}
  .cpl{padding:64px 22px 64px}
  .cpl h1{font-size:36px;letter-spacing:-1.4px}
  .rs-c{font-size:14.5px}
  .step-text{display:none}
  .sd{width:18px}
}
</style>
</head>
<body>
<header class="hd">
  <div class="logo">路演工坊</div>
  <div class="steps" id="steps"></div>
</header>
<div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
<main class="main" id="app"></main>
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const PRESET = {
  apiBase: 'https://api.deepseek.com',
  apiKey:  'sk-a70c9fa165e848e2938bdc376f06fa77',
  model:   'deepseek-chat',
  feishu:  'https://open.feishu.cn/open-apis/bot/v2/hook/6c2e4765-9a7c-4f51-873e-64e985f8faa5',
};

// 模型预设。点对应按钮即可一键切换接口地址 + 密钥 + 模型名。
const MODEL_PRESETS = {
  deepseek: {
    label: 'DeepSeek',
    base: 'https://api.deepseek.com',
    key:  'sk-a70c9fa165e848e2938bdc376f06fa77',
    model:'deepseek-chat',
  },
  gemini: {
    label: 'Gemini（viviai 中转）',
    base: 'https://api.viviai.cc',
    key:  'sk-nwB3wT0fGOfBSe1igRhPrOS4nwLP5m6n0i04oO8viaT7S83a',
    model:'gemini-2.5-pro',
  },
};

// ── CONSTANTS ─────────────────────────────────────────────
const VISIBLE = 5;

// ── 输出文风约束（注入所有 LLM 提示词，降 AI 腔）──────────
const WRITING_RULES = `

【输出文风 — 必须严格遵守】
- 像同行在咖啡馆聊天，不像写商业策划书或论文。
- 禁用空泛词。看到这些词就找具体替换。
  禁词举例（不限于）：深度、赋能、核心、本质上、赛道、闭环、维度、底层逻辑、颗粒度、对齐、复盘、生态、抓手、链路、深刻。
- 短句优先。多用句号，少用长串逗号。单句不超过 28 个汉字。
- 不要"首先 / 其次 / 最后"这种程式化连接词。
- 不要凡事都列三条要点。该一条就一条。
- 用具体场景和动作描写，不用抽象概念。
  说"凌晨两点接到客户电话，对方在哭"，不说"在用户最需要的时刻挺身而出"。
- 少用粗体。除非确实是结论，否则不要 ** 加粗。
- 不要使用破折号"——"。
- **绝对不要用括号描写自己的动作、表情、神态、停顿、心理活动。**
  禁止类型示例：
    "（停顿片刻）你说的这个……"
    "（看着你）这个问题很有意思。"
    "（微笑）让我们来想一想。"
    "*若有所思* ……"
    "[沉默 3 秒]"
  这是真实人和人的对话，不是小说、剧本或舞台旁白。直接说话即可。
- 如果上文已经规定了固定的输出格式（例如方括号【】、Mission 字段、第 N 幕等），那个结构格式照旧严格遵守。本约束只针对其中的描述用语。`;

// ── STATE ─────────────────────────────────────────────────
const S = {
  screen: 'setup',
  name: '', biz: '',
  apiBase: PRESET.apiBase,
  apiKey:  PRESET.apiKey,
  model:   PRESET.model,
  feishu:  PRESET.feishu,
  section: 0,
  busy: false,
  d: {},
};
for (let i = 1; i <= 6; i++)
  S.d[i] = { msgs: [], out: '', done: false, extra: '', turns: 0, draft: '', extraDraft: '', inputs: {}, inputsSubmitted: false, readyConfirmed: false };

// ── SECTION META ──────────────────────────────────────────
const META = {
  1: { name:'第一性原理',    desc:'剥离产品表象，找到你创业的本质驱动力', type:'chat', maxTurns:3, donePattern:/你的第一性原理不是/ },
  2: { name:'使命愿景价值观', desc:'将第一性原理转化为公司的战略罗盘',     type:'chat', maxTurns:2, donePattern:/使命(（Mission）|\s*[:：])/ },
  3: { name:'内在恐惧',      desc:'挖掘商业卡点背后隐藏的核心恐惧',       type:'chat', maxTurns:4, needExtra:true, extraLabel:'你目前遇到的商业卡点', extraHint:'例：我明知要让客户付费，却每次话到嘴边又咽回去…', donePattern:/核心恐惧底牌/ },
  4: { name:'用户洞察',      desc:'从客户视角洞察真实购买动机',           type:'gen',
       submitText:'生成用户洞察',
       inputFields:[
         { key:'biz',     label:'你的行业 / 初步产品方向', hint:'课堂讨论后可在此修改', height:100, default:() => S.biz },
         { key:'profile', label:'核心目标客户画像',         hint:'例：一位年入百万但极度焦虑子女教育的35岁海淀妈妈 / 一位面临现金流断裂危机的传统制造业老板', height:130, default:() => S.d[4].extra || '' },
       ] },
  5: { name:'原型重塑',      desc:'将产品从功能级重塑为精神级原型',        type:'gen',
       submitText:'生成原型重塑',
       inputFields:[
         { key:'biz', label:'你的业务 / 产品描述', hint:'课堂讨论后可在此修改', height:120, default:() => S.biz }
       ] },
  // 模块 6：不在前端独立步骤展示，作为底层整合报告在最终成果页自动生成
  6: { name:'路演讲稿',      desc:'整合所有洞察，生成 5 分钟路演逐字稿大纲', type:'gen',

// ── API ───────────────────────────────────────────────────
async function claude(messages, system) {
  const base = S.apiBase.replace(/\/$/, '');
  const isAnthropic = base.includes('anthropic.com');

  let url, headers, body;

  if (isAnthropic) {
    url = base + '/v1/messages';
    headers = {
      'Content-Type': 'application/json',
      'x-api-key': S.apiKey,
      'anthropic-version': '2023-06-01',
    };
    body = { model: 'claude-sonnet-4-6', max_tokens: 2048, messages };
    if (system) body.system = system;
  } else {
    url = base + '/v1/chat/completions';
    headers = {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + S.apiKey,
    };
    const msgs = system
      ? [{ role: 'system', content: system }, ...messages]
      : messages;
    body = { model: S.model || 'deepseek-chat', max_tokens: 2048, messages: msgs };
  }

  const r = await fetch(url, { method:'POST', headers, body: JSON.stringify(body) });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.error?.message || `HTTP ${r.status}`);
  }
  const data = await r.json();
  return isAnthropic ? data.content[0].text : data.choices[0].message.content;
}

async function startChat(n) {
  const sec = S.d[n];
  if (sec.msgs.length) return;
  S.busy = true; render();

  const initMsg = n === 1
    ? `我的职业 / 业务是：${S.biz}`
    : '开始吧';

  sec.msgs.push({ role:'user', content: initMsg });
  try {
    const reply = await claude(sec.msgs, sysPrompt(n));
    sec.msgs.push({ role:'assistant', content: reply });
  } catch(e) { toast('接口错误：' + e.message); sec.msgs = []; }
  S.busy = false; render();
}

async function userSays(n, text) {
  const sec = S.d[n];
  const meta = META[n];
  sec.turns++;
  const isFinal = sec.turns >= meta.maxTurns;
  const content = isFinal ? text + '\n\n（这是我的最后一个回答，请现在输出你的最终总结 / 结论。）' : text;
  sec.msgs.push({ role:'user', content });
  S.busy = true; render();

  try {
    const reply = await claude(sec.msgs, sysPrompt(n));
    sec.msgs.push({ role:'assistant', content: reply });
    const looksFinal = meta.donePattern && meta.donePattern.test(reply);
    if (isFinal || looksFinal) { sec.out = reply; sec.done = true; }
  } catch(e) { toast('接口错误：' + e.message); sec.msgs.pop(); }
  S.busy = false; render();
}

async function runGen(n) {
  if (S.d[n].done || S.busy) return;
  S.busy = true; render();
  try {
    const reply = await claude([{ role:'user', content: genPrompt(n) }], '');
    S.d[n].out = reply; S.d[n].done = true;
  } catch(e) { toast('接口错误：' + e.message); }
  S.busy = false; render();
}

// 底层整合：静默生成模块 6 的路演稿（不阻塞 UI）
async function runFinalReport() {
  const sec6 = S.d[6];

  sec6.inputs = {};
  for (const f of META[6].inputFields) {
    try { sec6.inputs[f.key] = f.default() || ''; } catch(e) { sec6.inputs[f.key] = ''; }

    sec6.out = reply; sec6.done = true;
  } catch(e) {

}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function fmt(t) {
  if (!t) return '';
  let s = String(t)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/【([^】\n]+?)】/g,'<strong class="hl">【$1】</strong>');
  return s.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p) return '';
    return '<p>' + p.replace(/\n/g,'<br>') + '</p>';
  }).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

      ${fields}
      <button class="btn" onclick="submitInputs(${n})">${meta.submitText||'生成'} <span class="mi">arrow_forward</span></button>
    </div>`;
  }

  // 模块 5 提交输入后的"温度暂停" — 等用户点击我准备好了再开始生成
  if (n === 5 && meta.type === 'gen' && sec.inputsSubmitted && !sec.readyConfirmed && !sec.done) {
    return `<div class="chat fi">
      ${sectionHeader(n, meta)}
      <div class="warm-pause">
        <h2>好的，我准备开始了。</h2>
        <p>接下来我会读一遍你这一路的所有回答，<br>给你一份原型重塑报告。</p>
        <p class="warm-meta">这一步会需要 30 到 60 秒。<br>喝口水，等我一下。</p>
        <button class="btn" onclick="confirmAndRun(${n})">我准备好了 <span class="mi">arrow_forward</span></button>
      </div>
    </div>`;
  }

  // 生成型模块 加载/已完成
  if (meta.type === 'gen') {
    if (!sec.done) {
      return `<div class="chat fi">
        ${sectionHeader(n, meta)}
        ${n > 1 ? ctxCard(n) : ''}
        <div class="gl"><div class="ld"><div class="ld-d"></div><div class="ld-d"></div><div class="ld-d"></div></div><p>正在分析，请稍候</p></div>
      </div>`;
    }
    const isLast = n === VISIBLE;
    return `<div class="chat fi">
      ${sectionHeader(n, meta)}
      <div class="msg out"><div class="bub">${fmt(sec.out)}</div></div>
      <button class="nb" onclick="${isLast?'doFinish()':'doNext()'}">${isLast?'生成完整路演稿':'进入下一模块'} <span class="mi">arrow_forward</span></button>
    </div>`;
  }

  // 对话型模块
  const visibleMsgs = sec.msgs.slice(1);
  const msgHtml = visibleMsgs.map(m => {
    const isU = m.role === 'user';
    const txt = m.content.replace(/\n\n（这是我的最后一个回答.*?）$/, '');
    return `<div class="msg ${isU?'u':'ai'}">
      <div class="av">${isU ? esc(S.name.slice(0,1)) : '<span class="mi">auto_awesome</span>'}</div>
      <div class="bub">${fmt(txt)}</div>
    </div>`;
  }).join('');

  const loading = S.busy ? `<div class="msg ai"><div class="av"><span class="mi">auto_awesome</span></div><div class="ld"><div class="ld-d"></div><div class="ld-d"></div><div class="ld-d"></div></div></div>` : '';

  const isLastChat = n === VISIBLE;
  const nextBtn = sec.done
    ? `<button class="nb" onclick="${isLastChat?'doFinish()':'doNext()'}">${isLastChat?'生成完整路演稿':'进入下一模块'} <span class="mi">arrow_forward</span></button>` : '';

  const inputArea = (!sec.done && !S.busy)
    ? `<div class="ia"><div class="ic">
        <textarea class="ci" id="ci" placeholder="输入你的回答" rows="1" onkeydown="onKey(event,${n})" oninput="autoH(this); saveDraft('ci', this.value)">${esc(sec.draft||'')}</textarea>
        <button class="sb" onclick="doSend(${n})"><span class="mi">send</span></button>
      </div></div>` : '';

  return `<div class="chat fi">
    ${sectionHeader(n, meta)}
    ${ctxCard(n)}
    <div class="msgs">${msgHtml}${loading}</div>
    ${nextBtn}
  </div>${inputArea}`;
}

function ctxCard(n) {
  if (n === 1) return `<div class="ctx"><strong>你的业务</strong>${esc(S.biz)}</div>`;
  if (n === 2) return S.d[1].out ? `<div class="ctx"><strong>第一性原理</strong>${esc(S.d[1].out.slice(0,120))}…</div>` : '';
  if (n === 3) return `<div class="ctx"><strong>你的商业卡点</strong>${esc(S.d[3].extra)}</div>`;
  if (n === 4) {
    const p = (S.d[4].inputs && S.d[4].inputs.profile) || S.d[4].extra || '';
    return p ? `<div class="ctx"><strong>目标客户画像</strong>${esc(p)}</div>` : '';
  }
  return '';
}

function renderComplete() {
  const names = {1:'第一性原理',2:'使命愿景价值观',3:'内在恐惧洞察',4:'用户深度洞察',5:'原型重塑报告',6:'路演逐字稿大纲'};
  const order = [1,2,3,4,5,6];
  const cards = order.map(k => {
    const v = S.d[k];
    if (v.out) {
      return `<div class="rs"><div class="rs-t">${names[k]}</div><div class="rs-c">${fmt(v.out)}</div></div>`;
    }
    if (k === 6 && !v.done) {
      return `<div class="rs"><div class="rs-t">${names[k]}</div>
        <div class="rs-loading">
          <div class="ld"><div class="ld-d"></div><div class="ld-d"></div><div class="ld-d"></div></div>
          正在整合前 5 个模块，生成完整路演稿…
        </div></div>`;
    }
    return '';
  }).join('');
  return `<div class="cpl fi">
    <div class="cpl-hd">
      <div class="cpl-eyebrow">完整成果</div>
      <h1>${esc(S.name)}，<br>你的路演稿已生成</h1>
      <p class="sub">以下是你这次工作坊的全部产出。<br>可一键复制全文，也可直接发送到飞书。</p>
      <div class="act">
        <button class="btn2" onclick="copyAll()"><span class="mi">content_copy</span> 复制全部</button>
        <button class="btn3" onclick="sendFeishu()"><span class="mi">send</span> 发送到飞书</button>
      </div>
    </div>
    ${cards}
  </div>`;
}

// ── AUTO-TRIGGER ──────────────────────────────────────────
function scheduleAutoStart() {
  if (S.busy) return;
  const n = S.section;
  const meta = META[n];
  const sec = S.d[n];
  if (n === 3 && !sec.extra) return;
  if (meta.inputFields && !sec.inputsSubmitted) return;
  // 模块 5 在用户确认前不自动生成
  if (n === 5 && meta.type === 'gen' && !sec.readyConfirmed && !sec.done) return;
  if (meta.type === 'chat' && !sec.msgs.length) {
    setTimeout(() => startChat(n), 100);
  } else if (meta.type === 'gen' && !sec.done) {
    setTimeout(() => runGen(n), 100);
  }
}

// ── EVENTS ────────────────────────────────────────────────
window.doStart = () => {
  const name = (document.getElementById('iName')?.value||'').trim();
  const biz  = (document.getElementById('iBiz')?.value||'').trim();
  const base = (document.getElementById('iBase')?.value||'').trim();
  const key  = (document.getElementById('iKey')?.value||'').trim();
  const model= (document.getElementById('iModel')?.value||'').trim();
  const feishu=(document.getElementById('iFeishu')?.value||'').trim();
  if (!name||!biz) { toast('请填写名字和业务描述'); return; }
  if (!base||!key)  { toast('请在高级设置中填写接口配置'); return; }
  S.name=name; S.biz=biz; S.apiBase=base; S.apiKey=key; S.model=model||PRESET.model; S.feishu=feishu;
  S.screen='chat'; S.section=1;
  render();
};

window.applyPreset = (key) => {
  const p = MODEL_PRESETS[key];
  if (!p) return;
  const ib = document.getElementById('iBase'); if (ib) ib.value = p.base;
  const ik = document.getElementById('iKey'); if (ik) ik.value = p.key;
  const im = document.getElementById('iModel'); if (im) im.value = p.model;
  toast('已切换到 ' + p.label);
};

window.doExtra = (n) => {
  const txt = (document.getElementById('iExtra')?.value||'').trim();
  if (!txt) { toast('请填写内容'); return; }
  S.d[n].extra = txt;
  if (META[n].type === 'chat') startChat(n);
  else runGen(n);
  render();
};

window.doSend = (n) => {
  const txt = (document.getElementById('ci')?.value||'').trim();
  if (!txt||S.busy) return;
  document.getElementById('ci').value = '';
  S.d[n].draft = '';
  userSays(n, txt);
};

window.saveDraft = (field, v) => {
  const n = S.section;
  if (!S.d[n]) return;
  if (field === 'ci') S.d[n].draft = v;
  else if (field === 'iExtra') S.d[n].extraDraft = v;
};

window.saveInputDraft = (n, key, v) => {
  if (!S.d[n].inputs) S.d[n].inputs = {};
  S.d[n].inputs[key] = v;
};

window.submitInputs = (n) => {
  const meta = META[n];
  const sec = S.d[n];
  if (!sec.inputs) sec.inputs = {};
  for (const f of meta.inputFields) {
    const el = document.getElementById('iIn_' + f.key);
    if (el) sec.inputs[f.key] = el.value.trim();
  }
  sec.inputsSubmitted = true;
  // 模块 5 加一个"温度暂停"，让用户做心理准备再开始生成
  if (n === 5 && meta.type === 'gen') {
    render();
    return;
  }
  if (meta.type === 'gen') runGen(n);
  else startChat(n);
  render();
};

window.confirmAndRun = (n) => {
  S.d[n].readyConfirmed = true;
  runGen(n);
  render();
};

function saveDrafts() {
  const n = S.section;
  if (!S.d[n]) return;
  const ci = document.getElementById('ci');
  const iExtra = document.getElementById('iExtra');
  if (ci) S.d[n].draft = ci.value;
  if (iExtra) S.d[n].extraDraft = iExtra.value;
  const meta = META[n];
  if (meta && meta.inputFields) {
    if (!S.d[n].inputs) S.d[n].inputs = {};
    for (const f of meta.inputFields) {
      const el = document.getElementById('iIn_' + f.key);
      if (el) S.d[n].inputs[f.key] = el.value;
    }
  }
}

window.onKey = (e, n) => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); doSend(n); }
};

window.autoH = (el) => {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
};

window.doNext = () => {
  if (S.busy) return;
  saveDrafts();
  const next = S.section + 1;
  if (next > VISIBLE) { doFinish(); return; }
  S.section = next;
  render();
};

window.doBack = () => {
  if (S.busy) return;
  saveDrafts();
  const prev = S.section - 1;
  if (prev < 1) return;
  S.section = prev;
  render();
};

window.doFinish = () => {
  saveDrafts();
  S.screen = 'complete';
  render();
  runFinalReport();
};

window.doComplete = window.doFinish;
window.sendFeishu = sendFeishu;
window.copyAll = copyAll;

// ── INIT ──────────────────────────────────────────────────
render();
</script>
</body>
</html>
